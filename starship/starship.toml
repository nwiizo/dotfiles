# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Starship Prompt Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Layout:
#   [left]  user@host dir  branch status  lang  infra  duration
#   [right] HH:MM
#   ❯ _
#
# Design principles:
#   - Show language/tool versions only when project files are detected
#   - Show user/host only over SSH
#   - Show cmd_duration only when > 2s
#   - Disable noisy modules (gcloud, package, battery, etc.)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$golang\
$rust\
$python\
$nodejs\
$terraform\
$docker_context\
$aws\
$kubernetes\
$cmd_duration\
$line_break\
$character"""

right_format = "$time"
continuation_prompt = "[  ](bright-black)"

add_newline = false
scan_timeout = 30
command_timeout = 500
follow_symlinks = true

# ─── Prompt Character ─────────────────────────────────────────────────────────

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# ─── User & Host (SSH only) ───────────────────────────────────────────────────

[username]
show_always = false
format = "[$user]($style)@"
style_user = "bold blue"
style_root = "bold red"

[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "bold green"

# ─── Directory ────────────────────────────────────────────────────────────────

[directory]
truncation_length = 3
truncate_to_repo = true
style = "cyan bold"
read_only = " "
home_symbol = "~"

# ─── Git ──────────────────────────────────────────────────────────────────────

[git_branch]
symbol = " "
style = "bold purple"
truncation_length = 20
truncation_symbol = "…"

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "bold red"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
stashed = "≡"
untracked = "?"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"
conflicted = "="

# ─── Languages ────────────────────────────────────────────────────────────────
# Auto-detected via project files. Only shown when relevant.

[golang]
symbol = " "
format = "via [$symbol($version )]($style)"

[rust]
symbol = " "
format = "via [$symbol($version )]($style)"

[python]
symbol = " "
format = "via [$symbol($version )(\\($virtualenv\\) )]($style)"

[nodejs]
symbol = " "
format = "via [$symbol($version )]($style)"

# ─── Infrastructure ───────────────────────────────────────────────────────────

[aws]
symbol = " "
format = "on [$symbol$profile(\\($region\\))]($style) "

[kubernetes]
symbol = "󱃾 "
format = "on [$symbol$context( \\($namespace\\))]($style) "
disabled = false

[terraform]
symbol = "󱁢 "
format = "via [$symbol$workspace]($style) "

[docker_context]
symbol = " "
format = "via [$symbol$context]($style) "
only_with_files = true

# ─── Timing ───────────────────────────────────────────────────────────────────

[cmd_duration]
min_time = 2_000
format = " took [$duration](bold yellow)"

[time]
disabled = false
format = "[$time]($style)"
style = "bright-black"
time_format = "%H:%M"

# ─── Disabled (performance) ───────────────────────────────────────────────────

[gcloud]
disabled = true

[azure]
disabled = true

[package]
disabled = true

[battery]
disabled = true

[memory_usage]
disabled = true

[env_var]
disabled = true
