# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Starship Prompt Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Layout:
#   [left]  user@host dir  branch status  lang  infra  jobs duration  exit
#   [right] HH:MM
#   ❯ _
#
# Design:
#   - Catppuccin Mocha palette (consistent with Neovim theme)
#   - Show language/tool only when project files detected
#   - Show user/host only over SSH
#   - Show cmd_duration only when > 2s
#   - Show exit status only on failure
#   - Transient prompt: previous lines show only ❯
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

palette = "catppuccin_mocha"

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$golang\
$rust\
$python\
$nodejs\
$terraform\
$docker_context\
$aws\
$kubernetes\
$jobs\
$cmd_duration\
$status\
$line_break\
$character"""

right_format = "$time"
continuation_prompt = "[  ](overlay0)"

add_newline = false
scan_timeout = 30
command_timeout = 500
follow_symlinks = true

# ─── Prompt Character ─────────────────────────────────────────────────────────

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# ─── User & Host (SSH only) ───────────────────────────────────────────────────

[username]
show_always = false
format = "[$user]($style)@"
style_user = "bold blue"
style_root = "bold red"

[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "bold teal"

# ─── Directory ────────────────────────────────────────────────────────────────

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold lavender"
read_only = " "
home_symbol = "~"

# ─── Git ──────────────────────────────────────────────────────────────────────

[git_branch]
symbol = " "
style = "bold mauve"
truncation_length = 20
truncation_symbol = "…"

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "bold maroon"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
stashed = "≡"
untracked = "?"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"
conflicted = "="

# ─── Languages ────────────────────────────────────────────────────────────────

[golang]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold sapphire"

[rust]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold peach"

[python]
symbol = " "
format = "via [$symbol($version )(\\($virtualenv\\) )]($style)"
style = "bold yellow"

[nodejs]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold green"

# ─── Infrastructure ───────────────────────────────────────────────────────────

[aws]
symbol = " "
format = "on [$symbol$profile(\\($region\\))]($style) "
style = "bold yellow"

[kubernetes]
symbol = "󱃾 "
format = "on [$symbol$context( \\($namespace\\))]($style) "
style = "bold blue"
disabled = false

[terraform]
symbol = "󱁢 "
format = "via [$symbol$workspace]($style) "
style = "bold mauve"

[docker_context]
symbol = " "
format = "via [$symbol$context]($style) "
style = "bold sky"
only_with_files = true

# ─── Status & Timing ─────────────────────────────────────────────────────────

[status]
disabled = false
format = "[$symbol$status]($style) "
symbol = " "
style = "bold red"
map_symbol = true
pipestatus = true
pipestatus_format = "\\[$pipestatus\\] => [$symbol$common_meaning$signal_name]($style) "

[jobs]
symbol = " "
style = "bold sapphire"
number_threshold = 1
symbol_threshold = 1

[cmd_duration]
min_time = 2_000
format = "took [$duration](bold yellow) "

[time]
disabled = false
format = "[$time]($style)"
style = "overlay1"
time_format = "%H:%M"

# ─── Disabled (performance) ───────────────────────────────────────────────────

[gcloud]
disabled = true

[azure]
disabled = true

[package]
disabled = true

[battery]
disabled = true

[memory_usage]
disabled = true

[env_var]
disabled = true

# ─── Catppuccin Mocha Palette ─────────────────────────────────────────────────
# https://github.com/catppuccin/starship

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
